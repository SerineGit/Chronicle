<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Хроника · Новый Орлеан</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css"> 
</head>
<body>

<header class="site-header">
  <button id="admin-btn" style="position:absolute; top:25px; right:80px; background:transparent; border:none; color:#C8A96E; font-size:22px; cursor:pointer; z-index:10;">⚙️</button>
   <div class="header-label">Новый Орлеан · 2013–2019</div>
  <h1 class="header-title"><span>Хроника</span> Персонажей</h1>
  <div class="header-sub">Архив · Биографии · Связи · События</div>
  
</header>

<!-- ГЛАВНЫЕ ПЕРСОНАЖИ -->
<div class="section-label">Главные персонажи</div>
<div class="chars-grid">
</div>

<!-- BIO MODAL -->
<div class="bio-modal" id="bio-modal">
  <div class="bio-modal-backdrop" onclick="closeBio()"></div>
  <div class="bio-modal-panel">
    <button class="bio-modal-close" onclick="closeBio()">✕</button>
    <div class="bio-modal-img-col" id="bio-img-col"></div>
    <div class="bio-modal-content">
      <div class="bio-modal-accent" id="bio-accent"></div>
      <div class="bio-modal-name" id="bio-name"></div>
      <div class="bio-modal-role" id="bio-role"></div>
      <div class="bio-stats" id="bio-stats"></div>
      <div class="bio-section-title">Биография</div>
      <div id="bio-text"></div>
      <div id="bio-secret"></div>
    </div>
  </div>
</div>

<!-- КАРТА СВЯЗЕЙ -->
<div class="section-label">Карта связей</div>
<div class="connections-wrap" id="connections-wrap">
  <svg id="connections-svg" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
        <path d="M0,0 L0,6 L8,3 z" fill="#C8A96E" opacity="0.8"/>
      </marker>
    </defs>
  </svg>

  <div class="connections-grid" id="main-connections-grid"></div>

  <div class="small-spacer"></div>
  <div style="font-size:10px;letter-spacing:4px;color:var(--muted);text-transform:uppercase;margin-bottom:12px;">Второстепенные</div>
  <div class="side-chars-grid" id="side-connections-grid"></div>
</div>
  
<!-- CHAR CHRONICLE MODAL -->
<div class="chronicle-modal" id="char-chronicle-modal">
  <div class="modal-backdrop-shared" onclick="closeCharChronicle()"></div>
  <div class="chronicle-modal-panel">
    <button class="bio-modal-close" onclick="closeCharChronicle()">✕</button>
    <div id="char-chronicle-content"></div>
  </div>
</div>

<!-- ИДЕИ -->
<div class="section-label">Идеи для игр</div>
<div class="spoiler-wrap" id="ideas-spoilers">
 </div>

<!-- ДОБАВИТЬ -->
<div class="section-label">Добавить</div>
<div class="action-section" style="display:flex;gap:14px;flex-wrap:wrap;">
  <button class="btn-add" onclick="openAddChronicleForm()">
    <span class="btn-add-icon">+</span>
    Добавить новую хронологию
  </button>
  <button class="btn-add" onclick="openAddIdeaForm()">
    <span class="btn-add-icon">✦</span>
    Идеи игр
  </button>
</div>

<div class="page-spacer"></div>

<!-- ФОРМА: ДОБАВИТЬ ХРОНОЛОГИЮ -->
<div class="form-modal" id="add-chronicle-modal">
  <div class="modal-backdrop-shared" onclick="closeAddChronicleForm()"></div>
  <div class="form-panel">
    <button class="bio-modal-close" onclick="closeAddChronicleForm()">✕</button>
    <div class="form-title">Новая запись хронологии</div>
    <div class="form-group">
      <label class="form-label">Персонаж</label>
      <select class="form-input form-select" id="fc-char">
        <option value="">— выберите персонажа —</option>
        <option value="elio">Элио Лаксфорд</option>
        <option value="chelsea">Челси Хилл</option>
        <option value="miles">Майлз Милошевич</option>
        <option value="celine">Селин Деверо</option>
        <option value="linda">Линда Мартин</option>
        <option value="day">Дэй Бэнкс</option>
        <option value="bert">Берт Милтон</option>
        <option value="hugo">Хьюго Йорк</option>
        <option value="mildi">Милдред Смит</option>
        <option value="piper">Piper Brandewin</option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Название игры</label>
        <input class="form-input" id="fc-title" type="text" placeholder="Первое знакомство…">
      </div>
      <div class="form-group">
        <label class="form-label">Дата</label>
        <input class="form-input" id="fc-date" type="text" placeholder="29.07.2019">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Ссылка на игру</label>
      <input class="form-input" id="fc-link" type="text" placeholder="https://…">
    </div>
    <div class="form-group">
      <label class="form-label">Описание (кратко)</label>
      <textarea class="form-textarea" id="fc-desc" placeholder="Что произошло в этой игре…"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Участники (через · )</label>
      <input class="form-input" id="fc-participants" type="text" placeholder="Элио · Челси">
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeAddChronicleForm()">Отмена</button>
      <button class="btn-submit" onclick="submitChronicle()">Добавить</button>
    </div>
  </div>
</div>

<!-- ФОРМА: ДОБАВИТЬ ИДЕЮ -->
<div class="form-modal" id="add-idea-modal">
  <div class="modal-backdrop-shared" onclick="closeAddIdeaForm()"></div>
  <div class="form-panel">
    <button class="bio-modal-close" onclick="closeAddIdeaForm()">✕</button>
    <div class="form-title">Идея для игры</div>
    <div class="form-group">
      <label class="form-label">Участники</label>
      <input class="form-input" id="fi-participants" type="text" placeholder="Майлз · Селин">
    </div>
    <div class="form-group">
      <label class="form-label">Название / заголовок</label>
      <input class="form-input" id="fi-title" type="text" placeholder="Фиктивный ужин с родителями…">
    </div>
    <div class="form-group">
      <label class="form-label">Сюжет</label>
      <textarea class="form-textarea" id="fi-plot" style="min-height:160px;" placeholder="Опишите идею, завязку, атмосферу…"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeAddIdeaForm()">Отмена</button>
      <button class="btn-submit" onclick="submitIdea()">Добавить</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
